<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">

    <title>Início</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <header class="hero">
        <div class="menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="menu-card" id="menu">
            <p><a href="pages/escola.html">ESCOLA</a></p>
            <div class="menu-line"></div>

            <p>PROJETOS</p>
            <div class="menu-line"></div>

            <p><a href="pages/cursos.html">CURSOS</a></p>
            <div class="menu-line"></div>

            <p>PROFESSORES</p>
            <div class="menu-line"></div>

            <p>EVENTOS</p>
            <div class="menu-line"></div>

            <p><a href="pages/horarios.html">HORÁRIOS</a></p>
            <div class="menu-line"></div>
        </div>

        <a class="logo" href="https://www.instagram.com/_diariojk/" target="_blank"><img src="img/instagram.png" alt="instagram do jornal">@_diariojk</a>

    </header>

    <nav class="nav">
        <ul>
            <li><a href="pages/escola.html">Escola</a></li>
            <li><a href="pages/cursos.html">Cursos</a></li>
            <li><a href="pages/horarios.html">Horários</a></li>
            <li class="eventos"><a href="#eventos" class="eventos">Eventos</a></li>
        </ul>
    </nav>

    <main>
        <p class="titulo">NOVIDADES</p>
        <span>Fique por dentro das atualizações</span>

        <div class="container">

            <div class="notificacoes">

                <span>Notificações</span>

                <div class="circle-box">
                    <div class="circle green" style="background-color: #2cca61;"></div>
                    <div class="circle blue" style="background-color: #00eaff;"></div>
                    <div class="circle yellow" style="background-color: #f0b71f;"></div>
                </div>

            </div>

            <div class="card">
                Sem notificações por enquanto!
            </div>

        </div>
        <span style="margin: 35px; color: rgba(0, 0, 0, 0.527); font-size: 14px;">DiárioJK | 2026</span>
    </main>
    <script>
        const botao = document.querySelector(".menu");
        const menu = document.getElementById("menu");

        botao.addEventListener("click", (event) => {
            event.stopPropagation();
            menu.classList.toggle("ativo");
        });

        document.addEventListener("click", () => {
            menu.classList.remove("ativo");
        });

        menu.addEventListener("click", (event) => {
            event.stopPropagation();
        });
    </script>

</body>
</html>
